import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
try{
const app=initializeApp({apiKey:"AIzaSyCrQyfKXGjEtiyOwci7jhd5_e3l3fMTClE",authDomain:"cepi-marajo-2026.firebaseapp.com",projectId:"cepi-marajo-2026",storageBucket:"cepi-marajo-2026.firebasestorage.app",messagingSenderId:"676779769177",appId:"1:676779769177:web:63c1671558172684056048"});
const db=getFirestore(app);
const REF=doc(db,"cepi_marajo","dados_2026");
window._fbSave=async p=>{await setDoc(REF,{...p,ts:Date.now()});};
window._fbLoad=async()=>{const s=await getDoc(REF);return s.exists()?s.data():null;};
window._fbListen=cb=>onSnapshot(REF,s=>{if(s.exists())cb(s.data());});
window._fbOk=true;window._fbRes(true);
}catch(e){window._fbOk=false;window._fbRej(e);}

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

.si2{flex:1;min-width:160px;padding:7px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;outline:none}
.tf{padding:8px 14px;border-top:1px solid var(--bd);background:#f8f9fb;font-size:11px;color:var(--mu);display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:700}
.bp{background:#4a7dff;color:#fff}.bs{background:#f3f4f6;color:#374151}.br{background:#fee2e2;color:#dc2626}.bg2{background:#dcfce7;color:#15803d}.bpur{background:#ede9fe;color:#7c3aed}
.ac{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:#f9fafb;border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;flex-wrap:wrap}
.bb{height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:4px}
.bf{height:100%;border-radius:3px}
.tg{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--w);border-radius:16px;padding:20px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:92vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:800;margin-bottom:14px}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--mu);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;outline:none}

.fr{display:flex;gap:8px;flex-wrap:wrap}
.fr .fg{flex:1;min-width:110px}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.rr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6}
.cfg-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f4f6}
.cfg-row .cl{flex:1}
.cfg-row .cl strong{display:block;font-size:13px;font-weight:700}
.cfg-row .cl small{color:var(--mu);font-size:11px}
.cfg-row input{width:66px;text-align:center;padding:6px 8px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;outline:none}
.fade{animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.load{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--mu);gap:12px;font-size:14px}
.spin{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:var(--c2);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:600px){.main{padding:10px}.lt p{display:none}.tab{padding:5px 8px;font-size:10px}}
</style>

<div class="lt"><h1>Prof&#170; Malu &middot; Controle de Atividades</h1><p>CEPI Maraj&#243; &middot; 2&ordm; Bimestre 2026</p></div>
<div class="sp"></div>

<div class="card" style="flex:1;min-width:180px"><div class="sb" id="turmaBar"><span class="sl">TURMA</span></div></div>

<div class="mbg" id="mAtiv" style="display:none" onclick="if(event.target===this)cm('mAtiv')">
<div class="modal"><h2>+ Nova Atividade</h2>
<div class="fr"><div class="fg" style="flex:3"><label>NOME</label><input type="text" id="aNome"/></div>
<div class="fg"><label>TIPO</label><select id="aTipo"><option value="ativ">Atividade</option><option value="simulado">Simulado</option><option value="dirigido">Est. Dirigido</option><option value="grupo">Trab. Grupo</option><option value="seminario">Semin&#225;rio</option><option value="prova">Avalia&#231;&#227;o</option></select></div></div>
<div class="fr"><div class="fg"><label>DATA</label><input type="date" id="aData"/></div><div class="fg"><label>PESO</label><input type="number" id="aPts" value="1" min="0" max="10" step="0.5"/></div></div>
<div class="fg"><label>TURMAS</label><div id="ativTurmas" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div><button type="button" class="btn bs" style="font-size:11px;padding:4px 10px" onclick="selTodas()">Todas</button></div>

</div></div>
<div class="mbg" id="mImport" style="display:none" onclick="if(event.target===this)cm('mImport')">
<div class="modal"><h2>Importar Lista</h2>
<p style="font-size:12px;color:var(--mu);margin-bottom:10px">Um nome por linha.</p>
<div class="fg"><label>LISTA</label><textarea id="iLista" placeholder="1. ANA BEATRIZ&#10;2. CARLOS"></textarea></div>
<div style="font-size:11px;color:var(--mu)" id="iCount">0 alunos</div>
<div class="ma"><button class="btn bs" onclick="cm('mImport')">Cancelar</button><button class="btn bp" onclick="confImport()">Importar</button></div>
</div></div>
<script>
const CFG_DEF={pesoAtiv:0.75,pesoProva:2.25,pesoCaderno:1,pesoSeminario:1,pesoExtra:1,notaApr:7,notaRec:5};
const SI={'9\u00ba H':{label:'9\u00ba Ano \u2013 Hist\u00f3ria',cor:'#1a6b8a',emoji:'\uD83D\uDCDC'},'1\u00baF':{label:'1\u00aa S\u00e9rie \u2013 Filosofia',cor:'#7c3aed',emoji:'\uD83E\uDDE0'},'1\u00baH':{label:'1\u00aa S\u00e9rie \u2013 Hist\u00f3ria',cor:'#2563eb',emoji:'\uD83D\uDCDC'},'2\u00baF':{label:'2\u00aa S\u00e9rie \u2013 Filosofia',cor:'#9333ea',emoji:'\uD83E\uDDE0'},'2\u00ba H':{label:'2\u00aa S\u00e9rie \u2013 Hist\u00f3ria',cor:'#0891b2',emoji:'\uD83D\uDCDC'},'3\u00baF':{label:'3\u00aa S\u00e9rie \u2013 Filosofia',cor:'#6d28d9',emoji:'\uD83E\uDDE0'},'1\u00ba S':{label:'1\u00aa S\u00e9rie \u2013 Sociologia',cor:'#c45a1a',emoji:'\uD83C\uDF0D'}};
const TIPO={ativ:{label:'Atividade',emoji:'\uD83D\uDCDD',cor:'#3b82f6'},simulado:{label:'Simulado',emoji:'\uD83D\uDCCA',cor:'#8b5cf6'},dirigido:{label:'Est. Dirigido',emoji:'\uD83D\uDCD6',cor:'#059669'},grupo:{label:'Trab. Grupo',emoji:'\uD83D\uDC65',cor:'#d97706'},seminario:{label:'Semin\u00e1rio',emoji:'\uD83C\uDFA4',cor:'#dc2626'},prova:{label:'Avalia\u00e7\u00e3o',emoji:'\u270F\uFE0F',cor:'#7c3aed'}};
let dados=null,cfg={...CFG_DEF},sheet='',turma='',view='alunos',busca='',saveTimer=null;

function normalizar(d){
  for(const sh of Object.keys(d)){
    if(sh.startsWith('_'))continue;
    const sd=d[sh];if(!sd||!sd.turmas)continue;
    if(!sd._ativ)sd._ativ={};
    const oa=sd.atividades||[];
    for(const t of Object.keys(sd.turmas)){
      if(!sd._ativ[t])sd._ativ[t]=oa.map(a=>typeof a==='string'?{nome:a,tipo:'ativ',data:'',pontos:1}:{...a,tipo:a.tipo||'ativ',pontos:a.pontos||1,data:a.data||''});
      for(const al of(sd.turmas[t]||[])){if(!al.entregas)al.entregas={};if(al.prova===undefined)al.prova=false;if(!al.caderno)al.caderno=0;if(!al.seminario)al.seminario=0;if(!al.extra)al.extra=0;}
    }
    delete sd.atividades;
  }
  return d;
}
function carregarLocal(){
  try{const s=localStorage.getItem('cepi_marajo_2026');if(s){const p=JSON.parse(s);if(p.dados&&Object.keys(p.dados).filter(k=>!k.startsWith('_')).length>0){dados=normalizar(p.dados);cfg=Object.assign({},CFG_DEF,p.cfg||{});sheet=p.sheetAtivo||Object.keys(p.dados).filter(k=>!k.startsWith('_'))[0];turma=p.turmaAtiva||Object.keys(dados[sheet]?.turmas||{})[0];return true;}}}catch(e){console.warn('local:',e);}
  return false;
}
function salvarLocal(){try{localStorage.setItem('cepi_marajo_2026',JSON.stringify({dados,cfg,sheetAtivo:sheet,turmaAtiva:turma}));localStorage.setItem('cepi_ts',String(Date.now()));}catch(e){}}
function salvar(){
  salvarLocal();setDot('pend');
  if(window._fbOk&&window._fbSave)window._fbSave({dados,cfg,sheetAtivo:sheet,turmaAtiva:turma}).then(()=>{setDot('ok');localStorage.setItem('cepi_ts',String(Date.now()));}).catch(()=>setDot(''));
  else setDot('ok');
}
function agendarSalvar(){setDot('pend');clearTimeout(saveTimer);saveTimer=setTimeout(salvar,1200);}
function setDot(s){const d=document.getElementById('dot');if(d){d.className='dot'+(s?' '+s:'');}}
const gDs=()=>Object.keys(dados||{}).filter(k=>!k.startsWith('_'));
const gD=()=>dados[sheet]||{turmas:{},_ativ:{}};
const gAl=()=>gD().turmas[turma]||[];
const gAv=()=>(gD()._ativ&&gD()._ativ[turma])||[];
function calcNota(al){const n=gAv().filter(a=>al.entregas&&al.entregas[a.nome]).length;return +(n*cfg.pesoAtiv+(al.caderno||0)*cfg.pesoCaderno+(al.prova?cfg.pesoProva:0)+(al.seminario||0)*cfg.pesoSeminario+(al.extra||0)*cfg.pesoExtra).toFixed(2);}
function nb(n){return '<span class="nb '+(n>=cfg.notaApr?'ng':n>=cfg.notaRec?'ny':'nr')+'">'+n.toFixed(2)+'</span>';}
function pc(p){return p>=70?'#16a34a':p>=40?'#ca8a04':'#dc2626';}
function fd(d){if(!d)return'';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function stats(){const al=gAl(),av=gAv();const me=al.length&&av.length?al.reduce((s,a)=>s+av.filter(v=>a.entregas&&a.entregas[v.nome]).length/av.length*100,0)/al.length:0;const mn=al.length?al.reduce((s,a)=>s+calcNota(a),0)/al.length:0;return{me,mn,apr:al.filter(a=>calcNota(a)>=cfg.notaApr).length,total:al.length};}
function buildUI(){
  if(!dados||!gDs().length){showLoading();return;}
  buildSheets();buildTurmas();buildStrip();render();
}
function showLoading(){
  document.getElementById('vAlunos').innerHTML='<div class="load"><div class="spin"></div><span>Conectando ao Firebase...<br>Seus dados est\u00e3o na nuvem e ser\u00e3o carregados em instantes.</span></div>';
  document.getElementById('vAtividades').style.display='none';
  document.getElementById('vStats').style.display='none';
  document.getElementById('vConfig').style.display='none';
  document.getElementById('vAlunos').style.display='';
}
function buildSheets(){
  const bar=document.getElementById('sheetBar');if(!bar)return;
  bar.innerHTML='<span class="sl">DISCIPLINA</span>';
  gDs().forEach(sh=>{
    const info=SI[sh]||{label:sh,cor:'#4a7dff',emoji:'\uD83D\uDCDA'};
    const on=sh===sheet;
    const btn=document.createElement('button');
    btn.className='chip'+(on?' on':'');
    btn.style.background=on?info.cor:'#f3f4f6';
    btn.style.color=on?'#fff':'#374151';
    btn.textContent=info.emoji+' '+info.label;
    btn.onclick=()=>{sheet=sh;turma=Object.keys(dados[sh].turmas)[0];agendarSalvar();buildUI();};
    bar.appendChild(btn);
  });
}
function buildTurmas(){
  const info=SI[sheet]||{cor:'#4a7dff'};
  const bar=document.getElementById('turmaBar');if(!bar)return;
  bar.innerHTML='<span class="sl">TURMA</span>';
  Object.keys(gD().turmas).forEach(t=>{
    const on=t===turma;
    const btn=document.createElement('button');
    btn.className='chip'+(on?' on':'');
    btn.style.borderColor=info.cor;
    btn.style.background=on?info.cor:'transparent';
    btn.style.color=on?'#fff':info.cor;
    btn.textContent=t;
    btn.onclick=()=>{turma=t;agendarSalvar();buildTurmas();buildStrip();render();};
    bar.appendChild(btn);
  });
}
function buildStrip(){const s=stats();document.getElementById('sstrip').innerHTML='<div class="sbx"><div class="v" style="color:#4a7dff">\uD83D\uDC65 '+s.total+'</div><div class="l">ALUNOS</div></div><div class="sbx"><div class="v" style="color:'+pc(s.me)+'">\u2705 '+s.me.toFixed(0)+'%</div><div class="l">ENTREGA</div></div><div class="sbx"><div class="v" style="color:'+(s.mn>=cfg.notaApr?'#16a34a':s.mn>=cfg.notaRec?'#ca8a04':'#dc2626')+'">\uD83D\uDCCA '+s.mn.toFixed(1)+'</div><div class="l">M\u00c9D.</div></div><div class="sbx"><div class="v" style="color:#16a34a">\uD83C\uDFC6 '+s.apr+'</div><div class="l">APROV.</div></div>';}
function render(){
  document.querySelectorAll('#vAlunos,#vAtividades,#vStats,#vConfig').forEach(el=>el.style.display='none');
  document.getElementById('v'+view.charAt(0).toUpperCase()+view.slice(1)).style.display='';
  if(view==='alunos')renderAlunos();
  else if(view==='atividades')renderAtividades();
  else if(view==='stats')renderStats();
  else if(view==='config')renderConfig();
}
function setView(v){view=v;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['alunos','atividades','stats','config'][i]===v));render();}
function renderAlunos(){
  const alunos=gAl(),ativs=gAv();
  const fil=busca?alunos.filter(a=>a.nome.toLowerCase().includes(busca.toLowerCase())):alunos;
  const thAv=ativs.map(a=>{const t=TIPO[a.tipo]||TIPO.ativ;return '<th class="c" title="'+a.nome+'">'+t.emoji+'<br><span style="font-size:9px;display:block;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+a.nome+'</span></th>';}).join('');
  const rows=fil.map((al,fi)=>{
    const ai=alunos.indexOf(al);const nota=calcNota(al);const ent=ativs.filter(a=>al.entregas&&al.entregas[a.nome]).length;
    const cbs=ativs.map(a=>{const f=al.entregas&&al.entregas[a.nome];const t=TIPO[a.tipo]||TIPO.ativ;const id='cb'+ai+'_'+a.nome.replace(/[^a-z0-9]/gi,'_');return '<td class="c"><div class="cb" id="'+id+'" style="background:'+(f?t.cor+'22':'#f9fafb')+';border-color:'+(f?t.cor:'#dde1ea')+'" onclick="toggleCb('+ai+',\''+a.nome.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\',\''+id+'\')">'+(f?'<span style="color:'+t.cor+';font-weight:900">\u2713</span>':'<span style="color:#d1d5db">\u2013</span>')+'</div></td>';}).join('');
    return '<tr><td style="color:var(--mu);font-weight:700;font-size:10px">'+(fi+1)+'</td><td><div style="font-weight:700;font-size:12px">'+al.nome+'</div><div id="ec'+ai+'" style="font-size:10px;color:var(--mu)">'+ent+'/'+ativs.length+'</div></td>'+cbs+'<td class="c"><input class="si" style="color:#16a34a" type="number" value="'+(al.caderno||0)+'" min="0" max="10" step="0.5" oninput="updAl('+ai+',\'caderno\',this.value)"></td><td class="c"><div class="cb" style="background:'+(al.prova?'#dcfce7':'#f9fafb')+';border-color:'+(al.prova?'#16a34a':'#dde1ea')+'" onclick="toggleProva('+ai+')">'+(al.prova?'<span style="color:#16a34a;font-weight:900">\u2713</span>':'<span style="color:#d1d5db">\u2013</span>')+'</div></td><td class="c"><input class="si" style="color:#7c3aed" type="number" value="'+(al.seminario||0)+'" min="0" max="10" step="0.5" oninput="updAl('+ai+',\'seminario\',this.value)"></td><td class="c"><input class="si" style="color:#d97706" type="number" value="'+(al.extra||0)+'" min="0" max="10" step="0.5" oninput="updAl('+ai+',\'extra\',this.value)"></td><td class="c" id="nc'+ai+'">'+nb(nota)+'</td><td class="c"><button class="btn br" style="padding:3px 7px;font-size:10px" onclick="remAluno('+ai+')">\u2715</button></td></tr>';
  }).join('')||'<tr><td colspan="'+(ativs.length+8)+'" style="text-align:center;padding:30px;color:var(--mu)">Nenhum aluno</td></tr>';
  document.getElementById('vAlunos').innerHTML='<div class="card fade"><div class="tb"><input class="si2" placeholder="\uD83D\uDD0D Buscar..." value="'+busca+'" oninput="busca=this.value;renderAlunos()"><button class="btn bp" onclick="om(\'mAluno\')">+ Aluno</button><button class="btn bs" onclick="om(\'mImport\')">\uD83D\uDCCB Lista</button></div><div class="tw"><table><thead><tr><th>#</th><th style="min-width:160px">ALUNO</th>'+thAv+'<th class="c">\uD83D\uDCD3</th><th class="c">\u270F</th><th class="c">\uD83C\uDFA4</th><th class="c">\u2B50</th><th class="c">NOTA</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div><div class="tf"><span><b>'+fil.length+'</b> aluno(s)</span><span>&bull;</span><span><b>'+ativs.length+'</b> atividade(s)</span></div></div>';
}
function renderAtividades(){
  const ativs=gAv(),alunos=gAl();
  const cards=ativs.map((a,i)=>{const t=TIPO[a.tipo]||TIPO.ativ;const ent=alunos.filter(al=>al.entregas&&al.entregas[a.nome]).length;const pct=alunos.length?ent/alunos.length*100:0;return '<div class="ac"><div style="width:36px;height:36px;border-radius:9px;background:'+t.cor+'18;display:flex;align-items:center;justify-content:center;font-size:17px">'+t.emoji+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+a.nome+'</div><div style="display:flex;gap:6px;margin-top:3px"><span class="tg" style="background:'+t.cor+'15;color:'+t.cor+'">'+t.label+'</span>'+(a.data?'<span style="font-size:11px;color:var(--mu)">\uD83D\uDCC5 '+fd(a.data)+'</span>':'')+'</div></div><div style="min-width:100px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="font-weight:700;color:'+pc(pct)+'">'+ent+'/'+alunos.length+'</span><span style="color:var(--mu)">'+pct.toFixed(0)+'%</span></div><div class="bb"><div class="bf" style="width:'+pct+'%;background:'+pc(pct)+'"></div></div></div><button class="btn bpur" style="padding:4px 9px;font-size:11px" onclick="eAtiv('+i+')">\u270F</button><button class="btn br" style="padding:4px 9px;font-size:11px" onclick="remAtiv('+i+')">\u2715</button><div id="ae'+i+'" style="display:none;width:100%;padding-top:10px;border-top:1px dashed var(--bd);margin-top:6px"><div style="display:flex;gap:8px;flex-wrap:wrap"><div style="flex:2;min-width:130px"><input type="text" id="en'+i+'" value="'+a.nome.replace(/"/g,'&quot;')+'" style="width:100%;padding:7px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;outline:none"></div><button class="btn bp" onclick="sAtiv('+i+')">\uD83D\uDCBE</button><button class="btn bs" onclick="eAtiv('+i+')">X</button></div></div></div>';}).join('')||'<div style="text-align:center;padding:40px;color:var(--mu)">Nenhuma atividade</div>';
  document.getElementById('vAtividades').innerHTML='<div class="card fade cp"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><h2 style="font-size:15px;font-weight:800">Atividades \u2014 '+turma+'</h2><button class="btn bp" onclick="om(\'mAtiv\')">+ Nova</button></div>'+cards+'</div>';
}
function renderStats(){
  const alunos=gAl();
  if(!alunos.length){document.getElementById('vStats').innerHTML='<div class="card cp">Sem dados.</div>';return;}
  const sorted=[...alunos].sort((a,b)=>calcNota(b)-calcNota(a));
  const rank=sorted.slice(0,15).map((al,i)=>'<div class="rr"><div style="width:24px;height:24px;border-radius:50%;background:'+(i<3?['#ffd700','#c0c0c0','#cd7f32'][i]:'#f3f4f6')+';color:'+(i<3?'#fff':'var(--mu)')+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">'+(i+1)+'</div><div style="flex:1;font-size:12px;font-weight:600">'+al.nome.split(' ').slice(0,3).join(' ')+'</div>'+nb(calcNota(al))+'</div>').join('');
  const f=[{l:0,h:cfg.notaRec,bg:'#fee2e2',tc:'#dc2626',lb:'< '+cfg.notaRec},{l:cfg.notaRec,h:cfg.notaApr,bg:'#fef9c3',tc:'#a16207',lb:cfg.notaRec+'-'+cfg.notaApr},{l:cfg.notaApr,h:99,bg:'#dcfce7',tc:'#15803d',lb:'\u2265 '+cfg.notaApr}];
  const dist=f.map(x=>{const q=alunos.filter(al=>{const n=calcNota(al);return n>=x.l&&n<x.h;}).length;return '<div style="flex:1;text-align:center"><div style="background:'+x.bg+';color:'+x.tc+';font-weight:800;font-size:20px;border-radius:9px;padding:10px 4px;margin-bottom:3px">'+q+'</div><div style="font-size:10px;color:var(--mu)">'+x.lb+'</div></div>';}).join('');
  document.getElementById('vStats').innerHTML='<div class="sg"><div class="card cp fade"><h3 style="font-size:12px;font-weight:700;color:var(--mu);margin-bottom:12px">\uD83C\uDFC6 RANKING</h3>'+rank+'</div><div class="card cp fade"><h3 style="font-size:12px;font-weight:700;color:var(--mu);margin-bottom:12px">\uD83D\uDCCA DISTRIBUI\u00c7\u00c3O</h3><div style="display:flex;gap:7px">'+dist+'</div></div></div>';
}
function renderConfig(){
  document.getElementById('vConfig').innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px"><div class="card cp fade"><h3 style="font-size:14px;font-weight:800;margin-bottom:14px">\u2696 Pesos</h3>'+cr('pesoAtiv','\uD83D\uDCDD Peso por Atividade')+cr('pesoProva','\u270F Pontos pela Prova')+cr('pesoCaderno','\uD83D\uDCD3 Caderno')+cr('pesoSeminario','\uD83C\uDFA4 Semin\u00e1rio')+cr('pesoExtra','\u2B50 Extra')+'</div><div class="card cp fade"><h3 style="font-size:14px;font-weight:800;margin-bottom:14px">\uD83C\uDFAF Crit\u00e9rios</h3>'+cr('notaApr','\uD83D\uDFE2 M\u00edn. Aprova\u00e7\u00e3o')+cr('notaRec','\uD83D\uDFE1 M\u00edn. Recupera\u00e7\u00e3o')+'</div><div class="card cp fade"><h3 style="font-size:14px;font-weight:800;margin-bottom:14px">\uD83D\uDCBE Dados</h3><div style="display:flex;flex-direction:column;gap:8px"><button class="btn bg2" onclick="exportCSV()">\u2193 Exportar CSV</button><button class="btn bp" onclick="exportJSON()">\u2193 Backup JSON</button><button class="btn bs" onclick="importJSON()">\u2191 Importar JSON</button><button class="btn br" onclick="recarregar()">\uD83D\uDD04 Recarregar Firebase</button></div></div></div>';
}
function cr(c,l){return '<div class="cfg-row"><div class="cl"><strong>'+l+'</strong></div><input type="number" value="'+cfg[c]+'" min="0" max="10" step="0.25" oninput="cfg[\''+c+'\']=parseFloat(this.value)||0;agendarSalvar();renderConfig();buildStrip()"></div>';}
function toggleCb(ai,nm,id){
  const tw=document.querySelector('.tw');const st=tw?tw.scrollTop:0,sl=tw?tw.scrollLeft:0;
  const al=dados[sheet].turmas[turma][ai];if(!al.entregas)al.entregas={};al.entregas[nm]=!al.entregas[nm];const f=al.entregas[nm];agendarSalvar();
  const av=gAv().find(a=>a.nome===nm);const t=TIPO[av?.tipo||'ativ']||TIPO.ativ;
  const cb=document.getElementById(id);if(cb){cb.style.background=f?t.cor+'22':'#f9fafb';cb.style.borderColor=f?t.cor:'#dde1ea';cb.innerHTML=f?'<span style="color:'+t.cor+';font-weight:900">\u2713</span>':'<span style="color:#d1d5db">\u2013</span>';}
  const ec=document.getElementById('ec'+ai);if(ec)ec.textContent=gAv().filter(a=>al.entregas&&al.entregas[a.nome]).length+'/'+gAv().length;
  const nc=document.getElementById('nc'+ai);if(nc)nc.innerHTML=nb(calcNota(al));
  if(tw){tw.scrollTop=st;tw.scrollLeft=sl;}buildStrip();
}
function toggleProva(ai){
  const al=dados[sheet].turmas[turma][ai];al.prova=!al.prova;agendarSalvar();
  const btn=document.querySelector('.cb[onclick="toggleProva('+ai+')"]');
  if(btn){btn.style.background=al.prova?'#dcfce7':'#f9fafb';btn.style.borderColor=al.prova?'#16a34a':'#dde1ea';btn.innerHTML=al.prova?'<span style="color:#16a34a;font-weight:900">\u2713</span>':'<span style="color:#d1d5db">\u2013</span>';}
  const nc=document.getElementById('nc'+ai);if(nc)nc.innerHTML=nb(calcNota(al));buildStrip();
}
function updAl(ai,c,v){dados[sheet].turmas[turma][ai][c]=parseFloat(v)||0;agendarSalvar();const nc=document.getElementById('nc'+ai);if(nc)nc.innerHTML=nb(calcNota(dados[sheet].turmas[turma][ai]));buildStrip();}
function remAluno(ai){if(!confirm('Remover?'))return;dados[sheet].turmas[turma].splice(ai,1);agendarSalvar();renderAlunos();buildStrip();}
function addAluno(){const n=document.getElementById('alNome').value.trim().toUpperCase();if(!n||n.length<3){alert('Nome curto');return;}const e={};gAv().forEach(a=>e[a.nome]=false);dados[sheet].turmas[turma].push({nome:n,entregas:e,prova:false,caderno:0,seminario:0,extra:0});document.getElementById('alNome').value='';cm('mAluno');agendarSalvar();renderAlunos();buildStrip();}
function om(id){document.getElementById(id).style.display='flex';if(id==='mAtiv')fillTurmas();}
function cm(id){document.getElementById(id).style.display='none';}
function fillTurmas(){const c=document.getElementById('ativTurmas');if(!c)return;const info=SI[sheet]||{cor:'#4a7dff'};c.innerHTML=Object.keys(gD().turmas).map(t=>{const on=t===turma;return '<button type="button" onclick="togTurma(this)" data-turma="'+t+'" class="chip'+(on?' on':'')+'" style="border-color:'+info.cor+';background:'+(on?info.cor:'transparent')+';color:'+(on?'#fff':info.cor)+'">'+t+'</button>';}).join('');}
function togTurma(btn){const info=SI[sheet]||{cor:'#4a7dff'};const on=btn.classList.contains('on');btn.classList.toggle('on',!on);btn.style.background=!on?info.cor:'transparent';btn.style.color=!on?'#fff':info.cor;}
function selTodas(){const btns=[...document.querySelectorAll('#ativTurmas button')];const info=SI[sheet]||{cor:'#4a7dff'};const all=btns.every(b=>b.classList.contains('on'));btns.forEach(b=>{b.classList.toggle('on',!all);b.style.background=!all?info.cor:'transparent';b.style.color=!all?'#fff':info.cor;});}
function addAtiv(){const n=document.getElementById('aNome').value.trim();if(!n){alert('Nome obrigat\u00f3rio');return;}const tipo=document.getElementById('aTipo').value;const data=document.getElementById('aData').value;const pts=parseFloat(document.getElementById('aPts').value)||1;const sd=dados[sheet];if(!sd._ativ)sd._ativ={};const sel=[...document.querySelectorAll('#ativTurmas button.on')].map(b=>b.dataset.turma);const ts=sel.length?sel:[turma];ts.forEach(t=>{if(!sd._ativ[t])sd._ativ[t]=[];if(!sd._ativ[t].find(a=>a.nome===n)){sd._ativ[t].push({nome:n,tipo,data,pontos:pts});(sd.turmas[t]||[]).forEach(al=>{if(!al.entregas)al.entregas={};al.entregas[n]=false;});}});document.getElementById('aNome').value='';cm('mAtiv');agendarSalvar();render();}
function eAtiv(i){const e=document.getElementById('ae'+i);if(e)e.style.display=e.style.display!=='block'?'block':'none';}
function sAtiv(i){const n=document.getElementById('en'+i)?.value.trim();if(!n)return;const sd=dados[sheet];if(!sd._ativ||!sd._ativ[turma])return;const o=sd._ativ[turma][i].nome;sd._ativ[turma][i].nome=n;if(n!==o)(sd.turmas[turma]||[]).forEach(al=>{if(al.entregas&&o in al.entregas){al.entregas[n]=al.entregas[o];delete al.entregas[o];}});agendarSalvar();renderAtividades();}
function remAtiv(i){if(!confirm('Remover atividade?'))return;const sd=dados[sheet];if(!sd._ativ||!sd._ativ[turma])return;const n=sd._ativ[turma][i].nome;sd._ativ[turma].splice(i,1);(sd.turmas[turma]||[]).forEach(al=>{if(al.entregas)delete al.entregas[n];});agendarSalvar();render();}
document.getElementById('iLista').addEventListener('input',function(){const l=parseLista(this.value);document.getElementById('iCount').textContent=l.length+' aluno(s)';});
function parseLista(txt){return txt.split('\n').map(l=>l.trim().replace(/^\d+[\.)]\s*/,'').trim().toUpperCase()).filter(l=>l.length>=4);}
function confImport(){const lista=parseLista(document.getElementById('iLista').value);if(!lista.length){alert('Nenhum aluno');return;}const ex=new Set(gAl().map(a=>a.nome));let n=0;lista.forEach(nome=>{if(!ex.has(nome)){const e={};gAv().forEach(a=>e[a.nome]=false);dados[sheet].turmas[turma].push({nome,entregas:e,prova:false,caderno:0,seminario:0,extra:0});n++;}});document.getElementById('iLista').value='';cm('mImport');agendarSalvar();renderAlunos();buildStrip();alert(n+' aluno(s) importado(s)!');}
function exportCSV(){const al=gAl(),av=gAv();const h=['Nome',...av.map(a=>a.nome),'Caderno','Prova','Semin\u00e1rio','Extra','Nota'];const rows=al.map(a=>[a.nome,...av.map(v=>(a.entregas&&a.entregas[v.nome])?'Sim':'N\u00e3o'),a.caderno||0,a.prova?'Sim':'N\u00e3o',a.seminario||0,a.extra||0,calcNota(a).toFixed(2)]);const csv=[h,...rows].map(r=>r.map(c=>'"'+c+'"').join(',')).join('\n');dl('\uFEFF'+csv,'Notas_'+sheet+'_'+turma+'.csv','text/csv');}
function exportJSON(){dl(JSON.stringify({dados,cfg},null,2),'CEPI_backup.json','application/json');}
function importJSON(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(!p.dados)throw new Error('inv\u00e1lido');dados=normalizar(p.dados);cfg=Object.assign({},CFG_DEF,p.cfg||{});const ks=Object.keys(dados).filter(k=>!k.startsWith('_'));sheet=ks[0];turma=Object.keys(dados[sheet].turmas)[0];salvar();buildUI();alert('Importado!');}catch(err){alert('Erro: '+err.message);}};r.readAsText(f);};inp.click();}
function recarregar(){if(!window._fbOk){alert('Firebase offline');return;}window._fbLoad().then(r=>{if(r&&r.dados){dados=normalizar(r.dados);cfg=Object.assign({},CFG_DEF,r.cfg||{});const ks=Object.keys(dados).filter(k=>!k.startsWith('_'));sheet=r.sheetAtivo&&dados[r.sheetAtivo]?r.sheetAtivo:ks[0];turma=r.turmaAtiva&&dados[sheet].turmas[r.turmaAtiva]?r.turmaAtiva:Object.keys(dados[sheet].turmas)[0];salvarLocal();buildUI();alert('Dados recarregados!');}}).catch(e=>alert('Erro: '+e.message));}
function dl(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}
window.onload=()=>{
  const local=carregarLocal();
  if(local&&dados&&gDs().length){buildUI();}
  else{showLoading();}
  (window._fbReady||Promise.reject()).then(()=>window._fbLoad()).then(r=>{
    if(r&&r.dados){
      dados=normalizar(r.dados);cfg=Object.assign({},CFG_DEF,r.cfg||{});
      const ks=Object.keys(dados).filter(k=>!k.startsWith('_'));
      const s=r.sheetAtivo&&dados[r.sheetAtivo]?r.sheetAtivo:ks[0];sheet=s;
      const t=r.turmaAtiva&&dados[s]?.turmas[r.turmaAtiva]?r.turmaAtiva:Object.keys(dados[s]?.turmas||{})[0];turma=t;
      salvarLocal();buildUI();
    }
    setDot('ok');
    window._fbListen&&window._fbListen(r=>{if(!r||!r.dados)return;const rt=r.ts||0,lt=parseInt(localStorage.getItem('cepi_ts')||'0');if(rt>lt){dados=normalizar(r.dados);cfg=Object.assign({},CFG_DEF,r.cfg||{});salvarLocal();buildUI();}});
  }).catch(e=>{console.warn('Firebase:',e);setDot('');if(!dados||!gDs().length)document.getElementById('vAlunos').innerHTML='<div class="load"><span>\u274C Firebase offline.<br>Verifique sua conex\u00e3o e recarregue a p\u00e1gina.</span><button class="btn bp" onclick="location.reload()">\uD83D\uDD04 Tentar novamente</button></div>';});
};
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mbg').forEach(m=>m.style.display='none');});
</script>
</body>
</html>
